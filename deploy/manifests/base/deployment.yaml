apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-service
  template:
    metadata:
      labels:
        app: sample-service
        app.kubernetes.io/name: sample-service
        app.kubernetes.io/part-of: gcp-secure-delivery-platform
      annotations:
        release.gcp-secure-delivery.dev/commit-sha: REPLACE_WITH_COMMIT_SHA
        release.gcp-secure-delivery.dev/build-id: REPLACE_WITH_BUILD_ID
        release.gcp-secure-delivery.dev/image-digest: REPLACE_WITH_IMAGE_DIGEST
        release.gcp-secure-delivery.dev/verification-status: REPLACE_WITH_VERIFICATION_STATUS
    spec:
      containers:
        - name: sample-service
          image: REPLACE_WITH_IMAGE
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: "base"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
